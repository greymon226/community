services:
  mysql:
    image: mysql:8.0
    container_name: community-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      TZ: Asia/Shanghai
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - internal
    # 注意：生产不暴露端口，仅 docker 内部网络访问
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: community-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: community-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d

      DB_DIALECT: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}

      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}

      SENSITIVE_WORDS: ${SENSITIVE_WORDS:-}

      AI_PROVIDER: ${AI_PROVIDER:-local}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-15000}

      CAS_SERVER_URL: ${CAS_SERVER_URL:-}
      CAS_SERVICE_URL: ${CAS_SERVICE_URL:-}
    volumes:
      - uploads-data:/app/uploads
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: community-frontend
    restart: unless-stopped
    depends_on:
      - backend
      - mcp
    environment:
      BACKEND_HOST: backend
      BACKEND_PORT: 4000
      MCP_HOST: mcp
      MCP_PORT: 3001
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - internal

  mcp:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: community-mcp
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "src/mcp/index.js", "--http"]
    environment:
      NODE_ENV: production
      MCP_PORT: 3001

      DB_DIALECT: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}

      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

      JWT_SECRET: ${JWT_SECRET}

      AI_PROVIDER: ${AI_PROVIDER:-local}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-15000}
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  uploads-data:
